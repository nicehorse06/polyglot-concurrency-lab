name: Polyglot Bench (Minimal)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cpu-hash-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run small matrix (W1 only)
        run: |
          TASKS=40 CONCURRENCY=2 PAYLOAD=128 ITERS=80 ./scripts/run_all.sh

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: results/latest
